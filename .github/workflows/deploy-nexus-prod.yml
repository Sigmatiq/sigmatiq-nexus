name: Deploy Sigmatiq Nexus Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'models/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - '.github/workflows/deploy-nexus-prod.yml'

concurrency:
  group: nexus-prod-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Test Nexus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest -q

  deploy:
    name: Build and Deploy Nexus
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      RESOURCE_GROUP: rg-sigmatiq-prod
      CONTAINER_APPS_ENV: cae-sigmatiq-prod
      ACR_LOGIN_SERVER: acrsigmatiqprodiotgrj.azurecr.io
      APP_NAME: sigmatiq-nexus-ca

    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          set -euo pipefail
          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          IMAGE_TAG="${GITHUB_SHA::12}"

          az acr build \
            --registry "$ACR_NAME" \
            --image "sigmatiq-nexus:${IMAGE_TAG}" \
            --image "sigmatiq-nexus:latest" \
            --file Dockerfile \
            .

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=${ACR_LOGIN_SERVER}/sigmatiq-nexus:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Create or update Container App
        run: |
          set -euo pipefail

          REDIS_CONN_STRING="${{ secrets.NEXUS_REDIS_URL }}"
          test -n "$REDIS_CONN_STRING"

          ACR_NAME="${ACR_LOGIN_SERVER%%.*}"
          ACR_USER="$(az acr credential show --name "$ACR_NAME" --query username -o tsv)"
          ACR_PASS="$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)"

          if ! az containerapp show --name "$APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az containerapp create \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APPS_ENV" \
              --image "$IMAGE_NAME" \
              --min-replicas 1 \
              --max-replicas 1 \
              --registry-server "$ACR_LOGIN_SERVER" \
              --registry-username "$ACR_USER" \
              --registry-password "$ACR_PASS" \
              --secrets "redis-url=${REDIS_CONN_STRING}" \
              --env-vars \
                "REDIS_URL=secretref:redis-url" \
                "NEXUS_REDIS_CLUSTER=true" \
                "NEXUS_SYMBOLS=SPY,QQQ,IWM,UVXY" \
                "NEXUS_FIRST_TRIGGER_SCOPE=symbol" \
                "NEXUS_GROUP_LOCK_STRATEGIES=etf_confluence_sniper" \
                "IMAGE_TAG=${IMAGE_TAG}"
          else
            az containerapp secret set \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --secrets "redis-url=${REDIS_CONN_STRING}"

            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --server "$ACR_LOGIN_SERVER" \
              --username "$ACR_USER" \
              --password "$ACR_PASS"

            az containerapp update \
              --name "$APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "$IMAGE_NAME" \
              --set-env-vars \
                "REDIS_URL=secretref:redis-url" \
                "NEXUS_REDIS_CLUSTER=true" \
                "NEXUS_SYMBOLS=SPY,QQQ,IWM,UVXY" \
                "NEXUS_FIRST_TRIGGER_SCOPE=symbol" \
                "NEXUS_GROUP_LOCK_STRATEGIES=etf_confluence_sniper" \
                "IMAGE_TAG=${IMAGE_TAG}"
          fi
