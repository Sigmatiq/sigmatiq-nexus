name: Validate Nexus Production

on:
  schedule:
    # DST-safe pair; runtime ET gate keeps the actual validation in the first
    # post-open market window.
    - cron: "40 13 * * 1-5"
    - cron: "40 14 * * 1-5"
  workflow_dispatch:

concurrency:
  group: nexus-prod-validate
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Nexus Redis overlay publish
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write
    env:
      RESOURCE_GROUP: ${{ vars.NEXUS_RESOURCE_GROUP || 'rg-sig-production' }}
      APP_NAME: ${{ vars.NEXUS_APP_NAME || 'sigmatiq-nexus-ca' }}
    steps:
      - uses: actions/checkout@v5

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install redis

      - name: Run Nexus publish smoke
        shell: bash
        run: |
          python3 scripts/check_nexus_publish.py \
            --resource-group "$RESOURCE_GROUP" \
            --app-name "$APP_NAME" \
            --symbols "SPY,QQQ,IWM" \
            --json
